acceptable = "The resting simulation has no not-a-number values and produces zero spikes."
acceptable_basis = "The rule is a direct stability sanity check on the resting sweep response before interpreting any driven spiking behavior."
evidence_metric_keys = ["synthetic_rest_spike_count", "synthetic_rest_final_v_mV"]

[[checks]]
kind = "summary_metric_status_map"
check_id = "synthetic_moderate_current_spiking"
