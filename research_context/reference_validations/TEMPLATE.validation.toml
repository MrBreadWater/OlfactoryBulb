# Optional extension point: if a paper needs a brand-new stimulus family,
# implement and register a new protocol runner in an extension module, then set
# protocol_runner above to that registered id. If a paper needs a comparison
# rule that the built-ins cannot express, add a new rule kind in the same
# extension module and reference it here.
#
# Rule-level gating lets one config cover multiple related targets cleanly:
# enabled_when_arg_truthy = "candidate_slice"
# enabled_when_arg_falsey = "skip_neuron"
# enabled_when_arg_in = "reference_gc_subtypes"
# enabled_values = ["sGC", "dGC"]
#
# Row filters can also pull values from CLI args instead of hardcoding them:
# filter_field = "gc_subtype"
# filter_values_arg = "reference_gc_subtypes"
#
# And non-equivalent but still informative comparisons can soften PASS to WARN:
# pass_status = "WARN"
# fail_status = "FAIL"
