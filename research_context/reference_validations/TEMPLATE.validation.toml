# Required validation identity
validation_id = "example_validation"
title = "Example literature validation audit"
description = "One-line summary of what this validation compares."
protocol_runner = "replace_with_registered_protocol_id"
metric_group_field = "cell_type"

# Optional extension modules. Use these when a paper needs a brand-new protocol
# runner or a brand-new rule kind without editing the core registry files.
# Each entry can be either:
# - "package.module" if the module defines register_reference_validation_extensions()
# - "package.module:callable_name" to call a specific registrar
# extensions = ["my_project.validation_extensions:register"]

[defaults]
reference_sigma_multiplier = 2.0

# Optional protocol defaults. These are passed into the registered protocol
# runner and can complement or override its built-in defaults.
[protocol]
# target_vm_mV = -58.0
# step_duration_ms = 2000.0

# Optional skip item for --skip-neuron on the generic validation CLI.
# [skip_item]
# check_id = "example_validation_skipped"
# status = "WARN"
# title = "Example validation skipped"
# criterion = "Explain what protocol execution was skipped."
# description = "This keeps the generic validation CLI informative even when the expensive model run is disabled."
# acceptable = "The report should clearly say that no protocol-backed measurements were produced."
# acceptable_basis = "This item is generated by command-line control flow rather than scientific data."
# evidence_arg_keys = ["reference_sigma_multiplier"]

# Required checks. Each check is one generic rule instance. Prefer config over
# custom Python until the rule system can no longer express the paper.

[[checks]]
kind = "protocol_executed"
check_id = "example_protocol_executed"
title = "Example protocol executed"
criterion = "Describe the required stimulus protocol here."
description = "This check confirms that the configured literature protocol actually ran."
acceptable = "At least one metric record is produced and the evidence shows the protocol parameters that were run."
acceptable_basis = "This is an execution sanity check rather than a literature tolerance band."

