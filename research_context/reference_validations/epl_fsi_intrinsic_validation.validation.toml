validation_id = "epl_fsi_intrinsic_validation"
title = "External plexiform layer fast-spiking interneuron intrinsic validation"
description = "Audit the maintained synthetic EPL fast-spiking interneuron surrogate against Burton, Malyshko, and Urban 2024 intrinsic-property and current-rate references."
protocol_runner = "epl_fsi_current_clamp"
metric_group_field = "cell_type"
notes_path = "research_context/validation_notes.csv"

[human_review]
default_status = "pending_review"

[defaults]
cell_models = "SyntheticEPL2026.PVCRH_FSI1"
reference_sigma_multiplier = 2.0

[protocol]
target_vm_mV = ""
step_start_nA = 0.05
step_stop_nA = 0.60
step_increment_nA = 0.05
step_duration_ms = 500.0
step_delay_ms = 100.0
tail_ms = 50.0
hyperpolarizing_start_nA = 0.0
hyperpolarizing_stop_nA = -0.20
hyperpolarizing_increment_nA = -0.05
celsius = 32.0
spike_threshold_mV = -20.0
ap_derivative_threshold_mV_per_ms = 15.0
cv_isi_target_rate_hz = 20.0
bias_settle_ms = 1000.0
bias_tolerance_mV = 0.1
bias_max_iterations = 24

[skip_item]
check_id = "epl_fsi_intrinsic_validation_skipped"
status = "WARN"
title = "External plexiform layer fast-spiking interneuron intrinsic validation was skipped"
criterion = "The audit should make it explicit when the NEURON-backed current-clamp protocol was not run."
description = "This keeps the generic declarative validation CLI informative even when command-line control flow skips the protocol execution."
acceptable = "The report clearly says that no protocol-backed intrinsic measurements were produced and preserves the key command-line settings."
acceptable_basis = "This item is generated by command-line control flow rather than by scientific data."
evidence_arg_keys = ["jobs", "reference_sigma_multiplier", "cell_models"]
human_review_status = "not_applicable"

[[checks]]
kind = "note_presence"
check_id = "epl_fsi_protocol_caveats"
title = "Notes / protocol caveats"
criterion = "Relevant external plexiform layer fast-spiking interneuron protocol caveats should be displayed whenever current-rate validation is rendered."
description = "This section keeps the Burton, Malyshko, and Urban 2024 example-cell scope and protocol caveats visible instead of burying them in raw CSV text."
acceptable = "All caveats relevant to the configured external plexiform layer fast-spiking interneuron current-rate context are displayed here."
acceptable_basis = "The note set is loaded from validation notes by matching the current-rate reference rows in scope."
scope = "fI_validation"
row_contexts = [
  { loader = "epl_fsi_fi_curve", filter_field = "protocol_id", filter_values = ["BMU2024_EPL_FSI_500ms_50_600pA_50pA"] },
]

[[checks]]
kind = "protocol_executed"
check_id = "epl_fsi_protocol_executed"
title = "External plexiform layer fast-spiking interneuron current-clamp protocol executed"
criterion = "Run the maintained synthetic EPL fast-spiking interneuron surrogate with five-hundred-millisecond depolarizing steps from fifty to six hundred picoamperes in fifty-picoampere increments."
description = "This top-level check confirms that the external plexiform layer fast-spiking interneuron protocol actually ran and produced at least one metric row."
acceptable = "At least one audited cell metric record is produced and the evidence lists the current-step family that was executed."
acceptable_basis = "This is an execution sanity check rather than a literature tolerance band."

[[checks]]
kind = "all_finite_metric"
check_id = "epl_fsi_resting_potential_recorded"
metric_key = "resting_potential_mV"
entity_key = "cell_name"
title = "Resting membrane potential was recorded for every audited external plexiform layer fast-spiking interneuron cell model"
criterion = "Every audited external plexiform layer fast-spiking interneuron model should produce a finite resting membrane potential before current-rate comparisons are interpreted."
description = "This is a prerequisite sanity check that the intrinsic sweep produced usable resting-potential estimates."
acceptable = "Every audited model has a finite resting membrane potential value."
acceptable_basis = "A finite resting-potential estimate is required before any direct comparison against the literature reference rows is meaningful."

[[checks]]
kind = "reference_band_rows"
loader = "epl_fsi_ephys"
reference_source = "Burton, Malyshko & Urban (2024)"
group_field = "cell_type"
filter_field = "cell_type"
filter_value = "EPL-FSI"
sigma_arg_name = "reference_sigma_multiplier"
property_metric_map = { "Membrane Resting Voltage" = "resting_potential_mV", "Input Resistance" = "input_resistance_MOhm", "Membrane Time Constant" = "membrane_time_constant_ms", "Capacitance" = "cell_capacitance_pF", "Spontaneous Firing Rate" = "spontaneous_firing_rate_Hz", "AP Amplitude" = "Amplitude_mV", "AP Half-Width" = "FWHM_ms", "AP Threshold" = "AP_onset_mV", "AHP Amplitude" = "AHP_amplitude_mV", "AHP Duration" = "T_AHP50_ms", "Rheobase Current" = "rheobase_pA", "FI Curve Slope" = "fi_slope_Hz_per_nA", "Max FI Rate" = "max_fi_rate_Hz", "ISI Coefficient of Variation" = "cv_isi", "Spiking Rate Accommodation" = "spike_accommodation_hz" }
property_band_modes = { "Membrane Resting Voltage" = "quantile_interval", "Input Resistance" = "quantile_interval", "Membrane Time Constant" = "quantile_interval", "Capacitance" = "quantile_interval", "Spontaneous Firing Rate" = "quantile_interval", "AP Amplitude" = "quantile_interval", "AP Half-Width" = "quantile_interval", "AP Threshold" = "quantile_interval", "AHP Amplitude" = "quantile_interval", "AHP Duration" = "quantile_interval", "Rheobase Current" = "quantile_interval", "FI Curve Slope" = "quantile_interval", "Max FI Rate" = "quantile_interval", "ISI Coefficient of Variation" = "quantile_interval", "Spiking Rate Accommodation" = "quantile_interval" }
property_lower_bounds = { "Input Resistance" = 0.0, "Membrane Time Constant" = 0.0, "Capacitance" = 0.0, "Spontaneous Firing Rate" = 0.0, "AP Amplitude" = 0.0, "AP Half-Width" = 0.0, "AHP Amplitude" = 0.0, "AHP Duration" = 0.0, "Rheobase Current" = 0.0, "FI Curve Slope" = 0.0, "Max FI Rate" = 0.0, "ISI Coefficient of Variation" = 0.0 }
title = "Uploaded external plexiform layer fast-spiking interneuron reference bands"
criterion = "Unused placeholder text; this rule auto-generates one item per mapped Burton, Malyshko, and Urban 2024 reference row."
description = "Unused placeholder text; this rule auto-generates one item per mapped Burton, Malyshko, and Urban 2024 reference row."
acceptable = "Unused placeholder text; this rule auto-generates one item per mapped Burton, Malyshko, and Urban 2024 reference row."
acceptable_basis = "Unused placeholder text; this rule auto-generates one item per mapped Burton, Malyshko, and Urban 2024 reference row."

[[checks]]
kind = "reference_curve_match"
check_id = "epl_fsi_reference_curve_match"
loader = "epl_fsi_fi_curve"
filter_field = "protocol_id"
filter_value = "BMU2024_EPL_FSI_500ms_50_600pA_50pA"
protocol_evidence_key = "fi_curve_rows"
reference_current_key = "current_pA"
reference_value_key = "firing_rate_Hz"
model_current_key = "current_pA"
model_value_key = "firing_rate_Hz"
maximum_mae = 25.0
maximum_rmse = 35.0
minimum_point_count = 10
title = "Model current-rate curve stays near the Burton, Malyshko, and Urban 2024 example-cell reference curve"
criterion = "The model current-rate curve should stay within a moderate error band of the extracted Burton, Malyshko, and Urban 2024 example-cell current-rate points."
description = "This compares the model current-rate curve against the extracted source-data point set using the same current values and the median inverse interspike-interval rate definition."
acceptable = "The matched current points produce at least ten shared current values, a mean absolute error no larger than twenty-five hertz, and a root-mean-square error no larger than thirty-five hertz."
acceptable_basis = "The current thresholds are pragmatic first-pass tolerances for an example-cell comparison rather than a formal population confidence interval."
