validation_id = "gc_intrinsic_validation"
title = "Granule cell intrinsic validation"
description = "Audit maintained granule-cell models against generic and subtype-specific granule-cell intrinsic references without silently pooling incompatible targets."
protocol_runner = "gc_intrinsic_current_clamp"
metric_group_field = "gc_subtype"
notes_path = "research_context/GC_validation_notes.csv"

[defaults]
cell_models = "GC1,GC2,GC3,GC4,GC5"
reference_gc_subtypes = "generic_or_unspecified"
reference_sigma_multiplier = 2.0

[protocol]
target_vm_mV = ""
step_start_nA = 0.0
step_stop_nA = 0.30
step_increment_nA = 0.05
step_duration_ms = 2000.0
step_delay_ms = 200.0
tail_ms = 200.0
hyperpolarizing_start_nA = 0.0
hyperpolarizing_stop_nA = -0.30
hyperpolarizing_increment_nA = -0.05
celsius = 32.0
spike_threshold_mV = -20.0
ap_derivative_threshold_mV_per_ms = 20.0
cv_isi_target_rate_hz = 20.0
bias_settle_ms = 1000.0
bias_tolerance_mV = 0.1
bias_max_iterations = 24

[skip_item]
check_id = "gc_intrinsic_validation_skipped"
status = "WARN"
title = "Granule-cell intrinsic validation was skipped"
criterion = "The audit should make it explicit when the NEURON-backed intrinsic protocol was not run."
description = "This keeps the declarative validation CLI informative even when the expensive protocol execution is skipped."
acceptable = "The report clearly says that no protocol-backed granule-cell measurements were produced and preserves the key command-line settings."
acceptable_basis = "This item is generated by command-line control flow rather than scientific data."
evidence_arg_keys = ["jobs", "reference_sigma_multiplier", "cell_models", "reference_gc_subtypes"]

[[checks]]
kind = "note_presence"
check_id = "gc_generic_fi_caveats"
enabled_when_arg_in = "reference_gc_subtypes"
enabled_values = ["generic_or_unspecified"]
title = "Notes / protocol caveats"
criterion = "Generic-granule-cell firing-rate-versus-current outputs should display the current extraction-status and protocol caveats that travel with the reference dataset."
description = "This section keeps the generic-granule-cell firing-rate-versus-current caveats visible, including the fact that the current-rate point table remains unavailable in the extracted bundle."
acceptable = "All caveats relevant to the generic-granule-cell firing-rate-versus-current context are displayed here."
acceptable_basis = "The note set is loaded from the granule-cell validation-notes table by matching the synthetic source and protocol context declared in this validation."
scope = "fI_validation"
synthetic_contexts = [
  { source = "GC_fI_curve.csv", protocol_id = "BU2015_GC_intrinsic_current_clamp", cell_type = "GC", gc_subtype = "generic_or_unspecified" },
]

[[checks]]
kind = "note_presence"
check_id = "gc_subtype_fi_caveats"
enabled_when_arg_in = "reference_gc_subtypes"
enabled_values = ["sGC", "dGC"]
title = "Notes / protocol caveats"
criterion = "Subtype granule-cell firing-rate-versus-current outputs should display the current extraction-status and subtype-separation caveats that travel with the reference dataset."
description = "This section keeps the subtype-specific granule-cell firing-rate-versus-current caveats visible, including the fact that the extracted source bundle still lacks validated subtype current-rate point tables."
acceptable = "All caveats relevant to the requested subtype granule-cell firing-rate-versus-current context are displayed here."
acceptable_basis = "The note set is loaded from the granule-cell validation-notes table by matching the synthetic source and protocol context declared in this validation."
scope = "fI_validation"
synthetic_contexts = [
  { source = "GC_sGC_dGC_fI_curve.csv", protocol_id = "GERAMITA2016_sGC_dGC_intrinsic_current_clamp", cell_type = "GC", gc_subtype = "sGC" },
  { source = "GC_sGC_dGC_fI_curve.csv", protocol_id = "GERAMITA2016_sGC_dGC_intrinsic_current_clamp", cell_type = "GC", gc_subtype = "dGC" },
]

[[checks]]
kind = "note_presence"
check_id = "gc_subtype_metadata_caveats"
enabled_when_arg_in = "reference_gc_subtypes"
enabled_values = ["sGC", "dGC"]
title = "Granule-cell subtype caveats"
criterion = "Subtype-aware granule-cell outputs should keep the subtype-separation and species-or-maturity caveats visible."
description = "This section resolves notes directly from the subtype reference rows so the report keeps the sGC-vs-dGC separation explicit."
acceptable = "All subtype caveats relevant to the selected superficial-granule-cell or deep-granule-cell rows are displayed here."
acceptable_basis = "The note set is loaded from the granule-cell validation-notes table by matching row-level note identifiers and subtype metadata."
scope = "granule_cell_validation"
row_contexts = [
  { loader = "gc_subtype_ephys", filter_field = "gc_subtype", filter_values_arg = "reference_gc_subtypes" },
]

[[checks]]
kind = "note_presence"
check_id = "gc_modulation_state_caveats"
enabled_when_arg_in = "reference_gc_subtypes"
enabled_values = ["adult_born_GC", "modulated_GC"]
title = "Granule-cell modulation and maturity caveats"
criterion = "Adult-born and modulated granule-cell outputs should keep modulation-state and species-or-maturity caveats visible."
description = "This section resolves notes directly from the adult-born and modulation reference rows so these targets are not silently pooled with baseline mature granule-cell references."
acceptable = "All modulation-state and maturity caveats relevant to the selected adult-born or modulated granule-cell rows are displayed here."
acceptable_basis = "The note set is loaded from the granule-cell validation-notes table by matching row-level note identifiers and subtype metadata."
scope = "granule_cell_validation"
row_contexts = [
  { loader = "gc_modulation", filter_field = "gc_subtype", filter_values_arg = "reference_gc_subtypes" },
]

[[checks]]
kind = "protocol_executed"
check_id = "gc_intrinsic_protocol_executed"
title = "Granule-cell intrinsic protocol executed"
criterion = "Run the maintained granule-cell models through the configured intrinsic current-clamp protocol and produce at least one metric row for every requested model."
description = "This is the top-level execution sanity check for the granule-cell intrinsic validation path."
acceptable = "At least one audited granule-cell metric record is produced and the evidence lists the current-step family that was executed."
acceptable_basis = "This rule is an implementation sanity check rather than a literature tolerance band."

[[checks]]
kind = "all_finite_metric"
check_id = "gc_resting_potential_recorded"
metric_key = "resting_potential_mV"
entity_key = "cell_name"
title = "Resting membrane potential was recorded for every audited granule-cell model"
criterion = "Every audited granule-cell model should produce a finite resting membrane potential before the literature comparisons are interpreted."
description = "This is a prerequisite sanity check that the intrinsic sweep produced usable resting-potential estimates."
acceptable = "Every audited granule-cell model has a finite resting membrane potential value."
acceptable_basis = "A finite resting-potential estimate is required before any direct comparison against the granule-cell reference rows is meaningful."

[[checks]]
kind = "all_exact_metric"
check_id = "gc_zero_current_quiescence"
metric_key = "zero_step_rate_Hz"
entity_key = "cell_name"
expected = 0.0
tolerance = 1e-9
title = "Granule-cell models remain quiescent during the zero-current step"
criterion = "Granule-cell models used for these intrinsic comparisons should not spike during the zero-current depolarizing-step condition."
description = "This keeps the intrinsic validation in a positive-rheobase regime rather than a spontaneously active zero-current regime."
acceptable = "Every audited model has a zero-current step firing rate of exactly zero hertz within tolerance."
acceptable_basis = "This is a regime sanity check for the configured current-clamp protocol rather than a direct literature confidence interval."

